<html>

<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
</head>

<body>
    <div class="container">
        

        <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
            aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-body">

                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                        <!-- 16:9 aspect ratio -->
                        <div class="embed-responsive embed-responsive-16by9">
                            <iframe class="embed-responsive-item" src="" id="video" allow="autoplay"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button class="video-btn"
            data-toggle="modal" data-src="https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4"
            data-target="#myModal">click me </button>

        <script>
            $(document).ready(function () {
                var $videoSrc;
                $(".video-btn").click(function () {
                    $videoSrc = $(this).data("src");
                });
                $("#myModal").on("shown.bs.modal", function (e) {
                    $("#video").attr(
                        "src",
                        $videoSrc + "?autoplay=1&amp;modestbranding=1&amp;showinfo=0"
                    );
                });
                $("#myModal").on("hide.bs.modal", function (e) {
                    $("#video").attr("src", ""); // Remove the video source.
                });
            });
        </script>
</body>

</html>
